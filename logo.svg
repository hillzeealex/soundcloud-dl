<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="SoundCloud DL">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1c"/>
      <stop offset="100%" stop-color="#0a0a0b"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8a3d"/>
      <stop offset="100%" stop-color="#ff5500"/>
    </linearGradient>
    <radialGradient id="ring" cx="0.5" cy="0.5" r="0.5">
      <stop offset="92%" stop-color="#ff5500" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ff5500" stop-opacity="0.35"/>
    </radialGradient>
  </defs>

  <!-- rounded square background -->
  <rect width="256" height="256" rx="56" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="255" height="255" rx="55.5" fill="none" stroke="#2a2a2d" stroke-width="1"/>

  <!-- soft outer glow -->
  <circle cx="128" cy="128" r="90" fill="url(#ring)"/>

  <!-- waveform inside a circle: a clean, symmetric audio bars composition -->
  <g transform="translate(128 128)">
    <!-- circular frame -->
    <circle r="80" fill="none" stroke="#2e2e31" stroke-width="2"/>
    <circle r="80" fill="none" stroke="url(#orange)" stroke-width="2" stroke-dasharray="6 502" stroke-dashoffset="-376" stroke-linecap="round" transform="rotate(-90)"/>

    <!-- audio bars (symmetric, anti-aliased look) -->
    <g fill="url(#orange)">
      <rect x="-58" y="-6"  width="6" height="12" rx="3"/>
      <rect x="-46" y="-14" width="6" height="28" rx="3"/>
      <rect x="-34" y="-26" width="6" height="52" rx="3"/>
      <rect x="-22" y="-18" width="6" height="36" rx="3"/>
      <rect x="-10" y="-32" width="6" height="64" rx="3"/>
      <rect x="2"   y="-22" width="6" height="44" rx="3"/>
      <rect x="14"  y="-30" width="6" height="60" rx="3"/>
      <rect x="26"  y="-16" width="6" height="32" rx="3"/>
      <rect x="38"  y="-22" width="6" height="44" rx="3"/>
      <rect x="50"  y="-10" width="6" height="20" rx="3"/>
    </g>

    <!-- small download arrow badge bottom-right of the disc -->
    <g transform="translate(58 58)">
      <circle r="22" fill="#0a0a0b" stroke="url(#orange)" stroke-width="2"/>
      <path d="M0 -10 L0 8 M-8 0 L0 8 L8 0" fill="none" stroke="#ff8a3d" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
